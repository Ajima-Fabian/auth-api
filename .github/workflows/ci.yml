name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Install dependencies
      - name: Install Dependencies
        run: npm install

      # 4. Run Tests
      - name: Run Tests
        run: npm test

      # 5. Build Docker Image
      - name: Build Docker Image
        run: docker build -t jwt-auth-api .

      # 6. Login DockerHub
      - name: Login DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 7. Build image
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/jwt-auth-api:latest .
 
      # 8. Push image
      - name: Push to DockerHub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/jwt-auth-api:latest
